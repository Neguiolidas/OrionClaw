<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrionClaw Installer - Tests</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #6366f1; }
    .test { margin: 10px 0; padding: 10px; background: #16213e; border-radius: 4px; }
    .pass { color: #22c55e; }
    .fail { color: #ef4444; }
    .log { color: #a0a0b0; font-size: 12px; margin-top: 5px; }
    button { padding: 10px 20px; background: #6366f1; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
    button:hover { background: #8b5cf6; }
    #results { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>🐺 OrionClaw Installer - Test Suite</h1>
  <p>Execute tests to validate the installer functionality.</p>
  
  <div>
    <button onclick="runAllTests()">Run All Tests</button>
    <button onclick="testNavigation()">Test Navigation</button>
    <button onclick="testConfig()">Test Config</button>
    <button onclick="testScriptGeneration()">Test Script Generation</button>
  </div>
  
  <div id="results"></div>

  <script>
    // Test results tracking
    let testResults = { passed: 0, failed: 0, total: 0 };
    
    function log(message, isPass) {
      const results = document.getElementById('results');
      const div = document.createElement('div');
      div.className = 'test';
      div.innerHTML = `<span class="${isPass ? 'pass' : 'fail'}">${isPass ? '✅ PASS' : '❌ FAIL'}</span>: ${message}`;
      results.appendChild(div);
      testResults.total++;
      if (isPass) testResults.passed++;
      else testResults.failed++;
    }
    
    function assert(condition, message) {
      log(message, condition);
      return condition;
    }
    
    // Mock DOM elements for testing
    function setupMockDOM() {
      // Create mock form elements
      document.body.innerHTML += `
        <div id="test-mock" style="display:none;">
          <input type="radio" name="os" value="windows" checked>
          <input type="radio" name="os" value="macos">
          <input type="radio" name="os" value="linux">
          <input type="text" id="install-dir" value="C:\\OrionClaw">
          <input type="checkbox" id="auto-start" checked>
          <input type="checkbox" name="providers" value="modal" checked>
          <input type="checkbox" name="providers" value="openrouter" checked>
          <input type="text" name="modal-key" value="ak-test123">
          <input type="text" name="openrouter-key" value="sk-or-test">
          <input type="checkbox" name="channels" value="telegram" checked>
          <input type="text" name="telegram-token" value="123:ABC">
          <input type="range" id="agent-count" value="1">
          <span id="agent-count-display">1</span>
          <input type="text" id="agent-name" value="TestBot">
          <select id="agent-personality"><option value="neutral" selected></option></select>
          <input type="text" id="user-name" value="TestUser">
          <div class="step active" data-step="1"></div>
          <div class="step" data-step="2"></div>
          <div class="step" data-step="3"></div>
          <div class="step" data-step="4"></div>
          <div class="step" data-step="5"></div>
          <div class="form-step active" data-step="1"></div>
          <div class="form-step" data-step="2"></div>
          <div class="form-step" data-step="3"></div>
          <div class="form-step" data-step="4"></div>
          <div class="form-step" data-step="5"></div>
          <button id="prev-btn" style="display:none;"></button>
          <button id="next-btn"></button>
          <code id="install-command"></code>
          <div id="config-summary"></div>
          <div id="cost-estimate"></div>
        </div>
      `;
    }
    
    // Test 1: Global functions exist
    function testGlobalFunctions() {
      const functions = [
        'scrollToInstall', 'setAgentCount', 'nextStep', 'prevStep',
        'downloadScript', 'copyCommand', 'getConfig'
      ];
      
      let allExist = true;
      functions.forEach(fn => {
        if (typeof window[fn] !== 'function') {
          assert(false, `Function ${fn} exists`);
          allExist = false;
        }
      });
      
      if (allExist) {
        assert(true, 'All global functions exist');
      }
    }
    
    // Test 2: Navigation works
    function testNavigation() {
      const results = document.getElementById('results');
      results.innerHTML = '<h3>Testing Navigation...</h3>';
      testResults = { passed: 0, failed: 0, total: 0 };
      
      try {
        // Test nextStep
        const initialStep = 1;
        if (typeof nextStep === 'function') {
          assert(true, 'nextStep function exists');
          
          // Simulate navigation
          try {
            nextStep();
            assert(true, 'nextStep executes without error');
          } catch (e) {
            assert(false, 'nextStep executes: ' + e.message);
          }
        } else {
          assert(false, 'nextStep function exists');
        }
        
        // Test prevStep
        if (typeof prevStep === 'function') {
          assert(true, 'prevStep function exists');
          
          try {
            prevStep();
            assert(true, 'prevStep executes without error');
          } catch (e) {
            assert(false, 'prevStep executes: ' + e.message);
          }
        } else {
          assert(false, 'prevStep function exists');
        }
      } catch (e) {
        assert(false, 'Navigation test: ' + e.message);
      }
      
      showSummary();
    }
    
    // Test 3: Config parsing
    function testConfig() {
      const results = document.getElementById('results');
      results.innerHTML = '<h3>Testing Config...</h3>';
      testResults = { passed: 0, failed: 0, total: 0 };
      
      try {
        if (typeof getConfig === 'function') {
          assert(true, 'getConfig function exists');
          
          const config = getConfig();
          
          assert(config !== null, 'getConfig returns object');
          assert(typeof config.os === 'string', 'Config has os property');
          assert(typeof config.installDir === 'string', 'Config has installDir');
          assert(Array.isArray(config.providers), 'Config has providers array');
          assert(Array.isArray(config.channels), 'Config has channels array');
          assert(typeof config.userName === 'string', 'Config has userName');
          assert(typeof config.agentCount === 'number', 'Config has agentCount');
          assert(typeof config.keys === 'object', 'Config has keys object');
          
        } else {
          assert(false, 'getConfig function exists');
        }
      } catch (e) {
        assert(false, 'Config test: ' + e.message);
      }
      
      showSummary();
    }
    
    // Test 4: Script generation
    function testScriptGeneration() {
      const results = document.getElementById('results');
      results.innerHTML = '<h3>Testing Script Generation...</h3>';
      testResults = { passed: 0, failed: 0, total: 0 };
      
      try {
        if (typeof generateWindowsScript === 'function') {
          assert(true, 'generateWindowsScript function exists');
          
          const config = {
            os: 'windows',
            installDir: 'C:\\OrionClaw',
            autoStart: true,
            providers: ['modal', 'openrouter'],
            channels: ['telegram'],
            userName: 'TestUser',
            agentCount: 1,
            agentName: 'TestBot',
            agentPersonality: 'neutral',
            keys: {
              modal: 'ak-test',
              openrouter: 'sk-or-test',
              telegram: '123:ABC'
            }
          };
          
          const script = generateWindowsScript(config);
          
          assert(typeof script === 'string', 'Script is string');
          assert(script.length > 1000, 'Script has substantial content');
          assert(script.includes('Node.js'), 'Script mentions Node.js');
          assert(script.includes('OpenClaw'), 'Script mentions OpenClaw');
          assert(!script.includes('${'), 'Script has no template literals');
          
        } else {
          assert(false, 'generateWindowsScript function exists');
        }
        
        if (typeof generateUnixScript === 'function') {
          assert(true, 'generateUnixScript function exists');
          
          const config = {
            os: 'linux',
            installDir: '~/OrionClaw',
            autoStart: true,
            providers: ['modal'],
            channels: [],
            userName: 'TestUser',
            agentCount: 1,
            agentName: 'TestBot',
            agentPersonality: 'neutral',
            keys: { modal: 'ak-test' }
          };
          
          const script = generateUnixScript(config);
          
          assert(typeof script === 'string', 'Unix script is string');
          assert(script.length > 1000, 'Unix script has content');
          assert(script.includes('#!/bin/bash'), 'Unix script has shebang');
          assert(!script.includes('${'), 'Unix script has no template literals');
          
        } else {
          assert(false, 'generateUnixScript function exists');
        }
      } catch (e) {
        assert(false, 'Script generation test: ' + e.message);
      }
      
      showSummary();
    }
    
    // Test 5: Syntax check
    function testSyntax() {
      try {
        // Try to parse the JS
        const xhr = new XMLHttpRequest();
        xhr.open('GET', 'app.js', false);
        xhr.send();
        
        if (xhr.status === 200) {
          try {
            new Function(xhr.responseText);
            assert(true, 'JavaScript syntax is valid');
          } catch (e) {
            assert(false, 'JavaScript syntax: ' + e.message);
          }
        } else {
          assert(false, 'Could not load app.js');
        }
      } catch (e) {
        assert(false, 'Syntax test: ' + e.message);
      }
    }
    
    // Run all tests
    function runAllTests() {
      const results = document.getElementById('results');
      results.innerHTML = '<h3>Running All Tests...</h3>';
      testResults = { passed: 0, failed: 0, total: 0 };
      
      testSyntax();
      testGlobalFunctions();
      
      showSummary();
    }
    
    function showSummary() {
      const results = document.getElementById('results');
      const summary = document.createElement('div');
      summary.className = 'test';
      summary.style.background = testResults.failed === 0 ? '#0d3320' : '#3d1f1f';
      summary.innerHTML = `
        <h3>Test Results</h3>
        <p>Total: ${testResults.total} | <span class="pass">Passed: ${testResults.passed}</span> | <span class="fail">Failed: ${testResults.failed}</span></p>
      `;
      results.appendChild(summary);
    }
    
    // Auto-run on load
    window.onload = function() {
      console.log('Test suite loaded');
    };
  </script>
</body>
</html>
